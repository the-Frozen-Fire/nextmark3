# compose.yaml
# AI Assisted Grading System - Team NextMark
# Jetson Nano 8GB deployment
# Created: 2026-02-06 by Billy Tilmon
# Purpose: Define microservices (postgres, ollama, backend, nginx) in Docker containers
# Follows industry best practices: one process per container, named volumes, internal bridge network

services:

  postgres:
    image: postgres:16
    container_name: nextmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nextmark-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextmark"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama@sha256:5f7a20da9b4d42d1909b4693f90942135bcabc335ee42d529c0d143c44a92311
    container_name: nextmark-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - nextmark-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextmark-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: qwen3:4b
    volumes:
      - ./backend:/app
    networks:
      - nextmark-net
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  nginx:
    image: nginx:stable-alpine
    container_name: nextmark-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    networks:
      - nextmark-net
    depends_on:
      - backend

networks:
  nextmark-net:
    driver: bridge

volumes:
  postgres-data:
  ollama-data:
